services:
  - type: web
    name: millena-ai
    runtime: docker
    plan: free
    healthCheckPath: /api/v1/health
    autoDeploy: true
    envVars:
      - key: APP_ENV
        value: production
      - key: STATIC_DIR
        value: /app/public
      - key: AI_PROVIDER
        value: local
      - key: DATABASE_MAX_CONNECTIONS
        value: "5"
      - key: DATABASE_URL
        fromDatabase:
          name: millena-postgres
          property: connectionString
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: DEMO_ADMIN_PASSWORD
        generateValue: true

databases:
  - name: millena-postgres
    databaseName: millena
    user: millena
    plan: free
